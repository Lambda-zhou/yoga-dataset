<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YogaDB - Yoga Pose Dataset Explorer</title>
<style>

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }
    input { font: inherit; }
    ol, ul { list-style: none; }
    summary { list-style: none; cursor: pointer; }
    summary::-webkit-details-marker { display: none; }

    /* ── Design Tokens ──────────────────────────────── */
    :root {
      --bg-base:        #f4f4f5;
      --bg-surface:     #ffffff;
      --bg-elevated:    #f0f0f1;
      --bg-input:       #f4f4f5;
      --border:         #e4e4e7;
      --border-hover:   #c4c4c7;
      --accent:         #ff4f00;
      --accent-muted:   rgba(255, 79, 0, 0.08);
      --text-primary:   #111111;
      --text-secondary: #71717a;
      --text-tertiary:  #a1a1aa;
      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      14px;
      --radius-xl:      18px;
      --sidebar-w:      260px;
    }

    /* ── Base ───────────────────────────────────────── */
    html, body { height: 100%; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }

    /* ── App Shell ──────────────────────────────────── */
    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-surface);
      z-index: 1;
    }

    .sidebar-logo {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .sidebar-logo span {
      color: var(--accent);
    }

    .sidebar-body {
      padding: 12px 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Search ─────────────────────────────────────── */
    .search-wrapper {
      position: relative;
      margin-bottom: 8px;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
      width: 14px;
      height: 14px;
    }

    .search-box {
      width: 100%;
      padding: 8px 32px 8px 32px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box::placeholder { color: var(--text-tertiary); }
    .search-box:focus { border-color: var(--accent); }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 16px;
      line-height: 1;
      display: none;
      padding: 2px 4px;
    }

    .search-clear:hover { color: var(--text-primary); }
    .search-clear.visible { display: block; }

    /* ── Filter Sections ────────────────────────────── */
    .filter-section {
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .filter-summary {
      display: flex;
      align-items: center;
      padding: 8px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      user-select: none;
    }

    .filter-options {
      padding: 4px 2px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .filter-show-more {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 3px 6px;
      border-radius: 20px;
      border: 1px dashed var(--border-hover);
      transition: all 0.1s;
    }

    .filter-show-more:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    /* ── Chips ──────────────────────────────────────── */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.1s;
      white-space: nowrap;
      text-transform: capitalize;
    }

    .chip:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .chip.active {
      background: var(--accent-muted);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Main Content ───────────────────────────────── */
    .main-content {
      overflow-y: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Results Bar ────────────────────────────────── */
    .results-bar {
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--bg-base);
      z-index: 2;
      border-bottom: 1px solid var(--border);
    }

    .results-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-right: auto;
    }

    .active-filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .active-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      background: var(--accent-muted);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      text-transform: capitalize;
    }

    .active-badge-remove {
      font-size: 13px;
      line-height: 1;
      color: var(--accent);
      opacity: 0.7;
      transition: opacity 0.1s;
    }

    .active-badge-remove:hover { opacity: 1; }

    .clear-all {
      font-size: 11px;
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .clear-all:hover { color: var(--text-primary); }

    /* ── Exercise Grid ──────────────────────────────── */
    .grid-wrapper {
      padding: 16px 20px 32px;
      flex: 1;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }

    /* ── Skeleton ───────────────────────────────────── */
    .skeleton-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .skeleton-media {
      aspect-ratio: 3/4;
      background: var(--bg-elevated);
    }

    .skeleton-body { padding: 10px 12px 12px; }

    .skeleton-line {
      height: 10px;
      border-radius: 5px;
      background: var(--bg-elevated);
      margin-bottom: 7px;
    }

    .skeleton-line.short { width: 60%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Exercise Card ──────────────────────────────── */
    .exercise-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .exercise-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .card-media {
      aspect-ratio: 3/4;
      background: var(--bg-elevated);
      overflow: hidden;
      position: relative;
    }

    .card-thumb,
    .card-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }

    .card-gif { opacity: 0; }
    .exercise-card:hover .card-thumb { opacity: 0; }
    .exercise-card:hover .card-gif { opacity: 1; }

    .card-body {
      padding: 9px 11px 11px;
    }

    .card-name {
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 5px;
      text-transform: capitalize;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: capitalize;
      letter-spacing: 0.01em;
    }

    .tag-cat  { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
    .tag-equip { background: rgba(34, 197, 94, 0.10); color: #4ade80; }

    /* ── Load Sentinel ──────────────────────────────── */
    .load-sentinel {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    .load-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .load-spinner.visible { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Empty State ────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    .empty-state p:first-child {
      font-size: 32px;
      margin-bottom: 8px;
    }

    /* ── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 16px;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: min(660px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.open .modal-panel {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      text-transform: capitalize;
    }

    .modal-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      margin-top: 2px;
    }

    .modal-close:hover {
      background: var(--accent-muted);
      border-color: var(--accent);
      color: var(--accent);
    }

    .modal-media {
      padding: 14px 18px 0;
    }

    .modal-gif {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 14px 18px 0;
    }

    .meta-chip {
      display: inline-flex;
      flex-direction: column;
      padding: 6px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      gap: 1px;
    }

    .meta-chip-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
    }

    .meta-chip-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: capitalize;
    }

    .modal-muscles {
      padding: 14px 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-muscles-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }

    .muscles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .muscles-group {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }

    .muscles-group-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
      margin-bottom: 7px;
    }

    .muscle-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .muscle-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      text-transform: capitalize;
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .muscle-tag.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .modal-instructions {
      padding: 0 18px 22px;
    }

    .modal-instructions-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      padding: 14px 0 0;
      display: block;
    }

    .lang-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin: 10px 0 14px;
    }

    .lang-tab {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 24px;
      border: none;
      background: none;
      color: var(--text-tertiary);
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
      letter-spacing: 0.01em;
    }

    .lang-tab:hover { color: var(--text-secondary); }

    .lang-tab.active { color: var(--text-primary); font-weight: 600; }

    .lang-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    .instructions-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      counter-reset: steps;
    }

    .instruction-step {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      counter-increment: steps;
    }

    .step-num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .step-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 768px) {
      /* Layout */
      .app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: 100dvh;
      }

      /* Sidebar → top panel */
      .sidebar {
        height: auto;
        max-height: 45vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-y: auto;
      }

      .sidebar-header {
        padding: 14px 14px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sidebar-body {
        padding: 10px 12px 16px;
        gap: 10px;
      }

      .search-wrapper { margin-bottom: 4px; }

      .filter-section { width: 100%; }

      .filter-options {
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .filter-options::-webkit-scrollbar { display: none; }

      /* Main */
      .main-content { height: auto; flex: 1; overflow-y: auto; }

      .results-bar { padding: 10px 14px 8px; }

      .grid-wrapper { padding: 12px 12px 28px; }

      .exercise-grid {
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
        gap: 10px;
      }

      /* Modal → bottom sheet */
      .modal-overlay {
        align-items: flex-end;
        padding: 0;
      }

      .modal-panel {
        width: 100%;
        max-height: 92dvh;
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        border-bottom: none;
      }

      .modal-gif { max-height: 240px; }

      /* Muscles grid → single col on small */
      .muscles-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .exercise-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .grid-wrapper { padding: 10px 10px 24px; }

      .modal-panel { max-height: 95dvh; }

      .modal-header { padding: 16px 16px 0; }
      .modal-media  { padding: 12px 16px 0; }
      .modal-meta   { padding: 12px 16px 0; }
      .modal-muscles      { padding: 12px 16px 14px; }
      .modal-instructions { padding: 0 16px 20px; }

      .lang-tab { padding: 8px 18px; }

      .card-name { font-size: 11.5px; }
    }
    /* ── DB Setup Button ─────────────────────────────── */
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .db-setup-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      background: var(--bg-elevated);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .db-setup-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .db-setup-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-muted); }

    /* ── DB Setup Overlay ────────────────────────────── */
    .db-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 16px;
    }

    .db-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .db-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: min(700px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .db-overlay.open .db-panel {
      transform: translateY(0) scale(1);
    }

    .db-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .db-panel-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .db-panel-subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 3px;
    }

    .db-panel-close {
      color: var(--text-tertiary);
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .db-panel-close:hover { color: var(--text-primary); }

    /* ── DB Tabs ─────────────────────────────────────── */
    .db-tabs {
      display: flex;
      gap: 2px;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .db-tab {
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .db-tab:hover { color: var(--text-primary); }
    .db-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── DB Steps ────────────────────────────────────── */
    .db-steps-wrap {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .db-step {
      display: flex;

 = crane, āsana = posture", "category": "Core Yoga", "categories": ["Core Yoga", "Arm Balance Yoga"], "difficulty": "Advanced", "focus": "Core", "target_areas": ["Core", "Arms"], "description": "From an inverted position, with the hips up and the head down, the arms are bent in a 90-degree angle with the knees resting on the elbows. The palms are firmly rooted into the earth with knuckles pressed firmly into the earth for support. The belly is pulled up and in towards the spine with the ribcage and chin lifted. The weight of the body shifts slightly forward as the toes lift up and off the earth into the full expression of the pose. The gaze is down and slightly forward.", "benefits": "Strengthens arms and wrists. Stretches the upper back. Strengthens the abdominal muscles. Opens the groin. Tones the abdominal organs.", "instruction_steps": {"en": ["From an inverted position, with the hips up and the head down, the arms are bent in a 90-degree angle with the knees resting on the elbows.", "The palms are firmly rooted into the earth with knuckles pressed firmly into the earth for support.", "The belly is pulled up and in towards the spine with the ribcage and chin lifted.", "The weight of the body shifts slightly forward as the toes lift up and off the earth into the full expression of the pose.", "The gaze is down and slightly forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483083/yoga-api/13_hdjxuz.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483083/yoga-api/13_hdjxuz.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0014", "name": "Dolphin", "sanskrit_name": "Ardha Pincha Mayurasana", "sanskrit_name_iast": "Pīñcha Mayūrāsana", "translation": "pīñcha = feather, mayūra = peacock, āsana = posture", "category": "Core Yoga", "categories": ["Core Yoga", "Strengthening Yoga", "Standing Yoga"], "difficulty": "Intermediate", "focus": "Core", "target_areas": ["Core", "Strength", "Legs"], "description": "From Downward-Facing Dog, the forearms are planted onto the earth with the elbows narrow and the palms down in a Sphinx position. The pelvis is tucked. The ribcage lifted. The feet are rooted and the legs are straight with the tailbone in dog tilt. The gaze is down and slightly forward.", "benefits": "Calms the brain and helps relieve stress and mild depression. Energizes the body. Stretches the shoulders, hamstrings, calves, arches, and hands. Strengthens the arms and legs. Helps relieve the symptoms of menopause. Relieves menstrual discomfort when done with the head supported. Helps prevent osteoporosis. Improves digestion. Relieves headache, insomnia, back pain, and fatigue. Therapeutic for high blood pressure, asthma, flat feet, sciatica, and sinusitis. Warms up the ankles and the toes.", "instruction_steps": {"en": ["From Downward-Facing Dog, the forearms are planted onto the earth with the elbows narrow and the palms down in a Sphinx position.", "The pelvis is tucked.", "The ribcage lifted.", "The feet are rooted and the legs are straight with the tailbone in dog tilt.", "The gaze is down and slightly forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483080/yoga-api/14_k9lr9a.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483080/yoga-api/14_k9lr9a.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0015", "name": "Downward-Facing Dog", "sanskrit_name": "Adho Mukha Svanasana", "sanskrit_name_iast": "Parivṛtta Adho Mukha Śvānāsana", "translation": "parivṛtta = revolved, adho = downward, mukha = facing, śvāna = dog, āsana = posture", "category": "Strengthening Yoga", "categories": ["Strengthening Yoga", "Forward Bend Yoga", "Standing Yoga"], "difficulty": "Intermediate", "focus": "Strength", "target_areas": ["Strength", "Hamstrings", "Legs"], "description": "From downward_dog.html the legs are straight with the sits bones tilted up and reaching for the sky. The feet are flat with the heels firmly rooted. One palm is flat with the knuckles evenly pressed into the earth. The other hand reaches under the body and grasps the opposite ankle. The spine is long and the heart is open toward the sky. The neck is loose and the crown of the head is relaxed toward the earth. The gaze is toward the center.", "benefits": "Calms the brain and helps relieve stress and mild depression. Energizes the body. Stretches the shoulders, neck, hamstrings, calves, arches, and hands. Strengthens the arms and legs. Helps relieve the symptoms of menopause. Relieves menstrual discomfort when done with the head supported. Helps prevent osteoporosis. Improves digestion. Relieves headache, insomnia, back pain, and fatigue. Therapeutic for high blood pressure, asthma, flat feet, sciatica, and sinusitis.", "instruction_steps": {"en": ["From downward_dog.html the legs are straight with the sits bones tilted up and reaching for the sky.", "The feet are flat with the heels firmly rooted.", "One palm is flat with the knuckles evenly pressed into the earth.", "The other hand reaches under the body and grasps the opposite ankle.", "The spine is long and the heart is open toward the sky.", "The neck is loose and the crown of the head is relaxed toward the earth.", "The gaze is toward the center."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483081/yoga-api/15_vkviqn.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483081/yoga-api/15_vkviqn.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0016", "name": "Eagle", "sanskrit_name": "Garudasana", "sanskrit_name_iast": "Garuḍāsana", "translation": "garuḍa = eagle, āsana = posture", "category": "Hip Opening Yoga", "categories": ["Hip Opening Yoga", "Standing Yoga", "Balancing Yoga"], "difficulty": "Advanced", "focus": "Hips", "target_areas": ["Hips", "Legs", "Balance"], "description": "From a standing position the one thigh is crossed over the other with the toes and/or the ankle hooked behind the lower calf. The weight of the body is balanced on the standing foot. The arms are crossed in front of the torso so that one arm is crossed above the other arm. The top arm is tucked into the elbow crook of the bottom arm. The hands are hooked around each other as well. Once hooked, the elbows lift up and the fingers stretch towards the ceiling. The gaze is soft and forward.", "benefits": "Strengthens and stretches the ankles and calves. Stretches the thighs, hips, shoulders, and upper back. Improves concentration. Improves sense of balance.", "instruction_steps": {"en": ["From a standing position the one thigh is crossed over the other with the toes and/or the ankle hooked behind the lower calf.", "The weight of the body is balanced on the standing foot.", "The arms are crossed in front of the torso so that one arm is crossed above the other arm.", "The top arm is tucked into the elbow crook of the bottom arm.", "The hands are hooked around each other as well.", "Once hooked, the elbows lift up and the fingers stretch towards the ceiling.", "The gaze is soft and forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483081/yoga-api/16_g7ueht.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483081/yoga-api/16_g7ueht.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0017", "name": "Extended Hand to Toe", "sanskrit_name": "Utthita Hasta Padangusthasana", "sanskrit_name_iast": "Utthita Hasta Pādāṅguṣṭhāsana", "translation": "utthita = extended, hasta = hand, pādāṅguṣṭha = big toe, āsana = posture", "category": "Hip Opening Yoga", "categories": ["Hip Opening Yoga", "Standing Yoga", "Balancing Yoga"], "difficulty": "Advanced", "focus": "Hips", "target_areas": ["Hips", "Legs", "Balance"], "description": "From mountain.html pose, lift one foot. Bend forward and catch the toes with the fingers. Place the other hand on the hip to square the hip towards the front. Slowly straighten the knee and the torso and open the leg to one side. Use a strap if necessary. Gaze towards the front or opposite of the extended leg for balance.", "benefits": "Opens the hips and groins. Stretches the hamstrings, IT bands and legs. Improves balance.", "instruction_steps": {"en": ["From mountain.html pose, lift one foot.", "Bend forward and catch the toes with the fingers.", "Place the other hand on the hip to square the hip towards the front.", "Slowly straighten the knee and the torso and open the leg to one side.", "Use a strap if necessary.", "Gaze towards the front or opposite of the extended leg for balance."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483084/yoga-api/17_l9joyu.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483084/yoga-api/17_l9joyu.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0018", "name": "Extended Side Angle", "sanskrit_name": "Utthita Parsvakonasana", "sanskrit_name_iast": "Utthita Pārśvakoṇāsana", "translation": "utthita = extended, pārśva = side, koṇa = angle, āsana = posture", "category": "Strengthening Yoga", "categories": ["Strengthening Yoga", "Standing Yoga"], "difficulty": "Intermediate", "focus": "Strength", "target_areas": ["Strength", "Legs"], "description": "From warrior II the lower body stays static while the upper body is folded forward at the crease of the hip. One arm is extended toward the front with the bicep by the ear and the fingers spread wide while the other reaches down to the earth on the inside of the thigh. The upper torso and the gaze twist up towards the sky.", "benefits": "Strengthens and stretches the legs, knees, and ankles. Stretches the groin, spine, waist, chest, lungs, and shoulders. Stimulates abdominal organs. Increases stamina.", "instruction_steps": {"en": ["From warrior II the lower body stays static while the upper body is folded forward at the crease of the hip.", "One arm is extended toward the front with the bicep by the ear and the fingers spread wide while the other reaches down to the earth on the inside of the thigh.", "The upper torso and the gaze twist up towards the sky."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483083/yoga-api/18_aqufak.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483083/yoga-api/18_aqufak.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0019", "name": "Forearm Stand", "sanskrit_name": "Pincha Mayurasana", "sanskrit_name_iast": "Pīñcha Mayūrāsana", "translation": "pīñcha = feather, mayūra = peacock, āsana = posture", "category": "Strengthening Yoga", "categories": ["Strengthening Yoga", "Inversion Yoga"], "difficulty": "Advanced", "focus": "Strength", "target_areas": ["Strength", "Full Body"], "description": "From an inverted position, with the body perpendicular to the earth, the weight of the body is supported on the forearms that are parallel and pressed firmly into the earth. The palms are flat. The knuckles are evenly pressed into the earth. The fingers are spread wide. Both legs reach up toward the sky in a straight line with the pelvis tucked. The ribcage is lifted. The gaze is forward.", "benefits": "Strengthens arms and shoulders. Improves focus and balance. Stretches the upper and lower back. Strengthens the abdominal muscles. Tones the abdominal area.", "instruction_steps": {"en": ["From an inverted position, with the body perpendicular to the earth, the weight of the body is supported on the forearms that are parallel and pressed firmly into the earth.", "The palms are flat.", "The knuckles are evenly pressed into the earth.", "The fingers are spread wide.", "Both legs reach up toward the sky in a straight line with the pelvis tucked.", "The ribcage is lifted.", "The gaze is forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483084/yoga-api/19_jadqwc.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483084/yoga-api/19_jadqwc.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0020", "name": "Forward Bend with Shoulder Opener", "sanskrit_name": "Uttanasana", "sanskrit_name_iast": "Uttānāsana", "translation": "uttāna = stretch out, āsana = posture", "category": "Forward Bend Yoga", "categories": ["Forward Bend Yoga"], "difficulty": "Beginner", "focus": "Hamstrings", "target_areas": ["Hamstrings"], "description": "From a standing position, the body is folded over at the crease of the hip with the spine long. The neck is relaxed and the crown of the head is towards the earth. The feet are rooted into the earth. The toes are actively lifted. The spine is straight. The ribcage is lifted. The chest and the thighs are connected. The sacrum lifts up toward the sky in dog tilt. The fingers are interlaced behind the body and the palms are together. The arms and elbows are straight. The shoulder blades rotate towards each other as the hands move forward (away from the lower back). The gaze is down and inward.", "benefits": "Calms the brain and helps relieve stress and mild depression. Stimulates the liver and kidneys. Stretches the hamstrings, calves, and hips. Strengthens the thighs and knees. Improves digestion. Helps relieve the symptoms of menopause. Reduces fatigue and anxiety. Relieves headache and insomnia. Relieves headache and insomnia. Opens the shoulders.", "instruction_steps": {"en": ["From a standing position, the body is folded over at the crease of the hip with the spine long.", "The neck is relaxed and the crown of the head is towards the earth.", "The feet are rooted into the earth.", "The toes are actively lifted.", "The spine is straight.", "The ribcage is lifted.", "The chest and the thighs are connected.", "The sacrum lifts up toward the sky in dog tilt.", "The fingers are interlaced behind the body and the palms are together.", "The arms and elbows are straight.", "The shoulder blades rotate towards each other as the hands move forward (away from the lower back).", "The gaze is down and inward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/20_uogrfq.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/20_uogrfq.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0021", "name": "Half-Moon", "sanskrit_name": "Ardha Chandrasana", "sanskrit_name_iast": "Ardha Chandrāsana", "translation": "ardha = half, chandra = moon,āsana = posture", "category": "Standing Yoga", "categories": ["Standing Yoga", "Balancing Yoga"], "difficulty": "Advanced", "focus": "Legs", "target_areas": ["Legs", "Balance"], "description": "From a standing position one leg is straight while the other is extended back parallel to the earth (or a little above parallel) and one hand is on the earth (beyond the little-toe side of the foot, about 12 inches) while the other hand is extended up towards the sky. The shoulder blades are squeezed together and the fingers move outward in opposing directions. The weight of the body is supported mostly by the standing leg while the bottom hand has very little weight on it but is used intelligently to regulate balance. The upper torso is rotated open to the sky. Both hips are externally rotated. Energy is extended actively through the flexed toes to keep the raised leg strong. The inner ankle of the standing foot is lifted strongly upward, as if drawing energy from the earth. The sacrum and scapulae are firmly pressed against the back torso and lengthen the coccyx toward the raised foot. The gaze is either up or down, depending on the condition of the neck. If injured the gaze is down.", "benefits": "Strengthens the abdomen, ankles, thighs, buttocks and spine. Stretches the groins, hamstrings, calves, shoulders, chest and spine. Improves coordination and sense of balance. Helps relieve stress. Improves digestion.", "instruction_steps": {"en": ["From a standing position one leg is straight while the other is extended back parallel to the earth (or a little above parallel) and one hand is on the earth (beyond the little-toe side of the foot, about 12 inches) while the other hand is extended up towards the sky.", "The shoulder blades are squeezed together and the fingers move outward in opposing directions.", "The weight of the body is supported mostly by the standing leg while the bottom hand has very little weight on it but is used intelligently to regulate balance.", "The upper torso is rotated open to the sky.", "Both hips are externally rotated.", "Energy is extended actively through the flexed toes to keep the raised leg strong.", "The inner ankle of the standing foot is lifted strongly upward, as if drawing energy from the earth.", "The sacrum and scapulae are firmly pressed against the back torso and lengthen the coccyx toward the raised foot.", "The gaze is either up or down, depending on the condition of the neck.", "If injured the gaze is down."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/21_etedlp.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/21_etedlp.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0022", "name": "Handstand", "sanskrit_name": "Adho Mukha Vrksasana", "sanskrit_name_iast": "Adho Mukha Vṛkṣāsana", "translation": "adho = downward, mukha = facing, vṛkṣa = tree, āsana = posture", "category": "Strengthening Yoga", "categories": ["Strengthening Yoga", "Standing Yoga", "Balancing Yoga"], "difficulty": "Advanced", "focus": "Strength", "target_areas": ["Strength", "Legs", "Balance"], "description": "In this inverted posture the weight of the body is on the hands - shoulder-width apart with fingers forward and parallel to each other (if the shoulders are tight, the index fingers are turned out slightly). The shoulder blades are firm against the back torso and pulled up toward the tailbone. The upper arms are rotated outward with the eye of the elbow to the front of the room to keep the shoulder blades broad while the outer arms hug inward in opposing forces for balance and stability. The palms are spread and the bases of the index fingers are pressed firmly against the earth. Balance is maintained by keeping the Bandhas engaged while pressing the earth away with straight arms and flexed feet. The gaze is down and forward.", "benefits": "Strengthens the shoulders, arms and wrists. Stretches the belly. Improves sense of balance. Calms the brain and helps relieve stress and mild depression.", "instruction_steps": {"en": ["In this inverted posture the weight of the body is on the hands - shoulder-width apart with fingers forward and parallel to each other (if the shoulders are tight, the index fingers are turned out slightly).", "The shoulder blades are firm against the back torso and pulled up toward the tailbone.", "The upper arms are rotated outward with the eye of the elbow to the front of the room to keep the shoulder blades broad while the outer arms hug inward in opposing forces for balance and stability.", "The palms are spread and the bases of the index fingers are pressed firmly against the earth.", "Balance is maintained by keeping the Bandhas engaged while pressing the earth away with straight arms and flexed feet.", "The gaze is down and forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/22_ojzmr8.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483085/yoga-api/22_ojzmr8.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0023", "name": "Low Lunge", "sanskrit_name": "Anjaneyasana", "sanskrit_name_iast": "Aṅjaneyāsana", "translation": "aṅjaneya = praise, āsana = posture", "category": "Standing Yoga", "categories": ["Standing Yoga"], "difficulty": "Intermediate", "focus": "Legs", "target_areas": ["Legs"], "description": "The front knee is bent in a 90-degree angle directly above the ankle and the back knee is resting on the earth with the top of the back foot pressed firmly into the earth. The hips are squared and pressed forward. The inner thighs scissor towards each other. The pelvis is tucked under to protect the low back. The ribcage is lifted. The arms are lifted. The hands can be together or separated and facing each other with the fingers spread wide. The gaze is forward.", "benefits": "Stretches the chest, lungs, neck, belly and groin (psoas). Strengthens the shoulders, arms and back muscles. Strengthens and stretches the thighs, calves and ankles.", "instruction_steps": {"en": ["The front knee is bent in a 90-degree angle directly above the ankle and the back knee is resting on the earth with the top of the back foot pressed firmly into the earth.", "The hips are squared and pressed forward.", "The inner thighs scissor towards each other.", "The pelvis is tucked under to protect the low back.", "The ribcage is lifted.", "The arms are lifted.", "The hands can be together or separated and facing each other with the fingers spread wide.", "The gaze is forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483086/yoga-api/23_k2jccj.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483086/yoga-api/23_k2jccj.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0024", "name": "Pigeon", "sanskrit_name": "Supta Kapotasana", "sanskrit_name_iast": "Supta Kapotāsana", "translation": "supta = supine, kapota = pigeon, āsana = posture", "category": "Backbend Yoga", "categories": ["Backbend Yoga"], "difficulty": "Intermediate", "focus": "Spine", "target_areas": ["Spine"], "description": "Lie on the back in supine position. Bend the knees, heels close to SI bones and cross one ankle over the opposite knee. Thread the hands or reach through between the thighs. Lift the foot off the floor and hold the bent knee behind the thigh or shin to bring it closer to the chest, make sure that the acrum is rooted to the floor.", "benefits": "Stretches the hamstrings and quads. If the elbow is used to push the thigh, it opens the hips as well.", "instruction_steps": {"en": ["Lie on the back in supine position.", "Bend the knees, heels close to SI bones and cross one ankle over the opposite knee.", "Thread the hands or reach through between the thighs.", "Lift the foot off the floor and hold the bent knee behind the thigh or shin to bring it closer to the chest, make sure that the acrum is rooted to the floor."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/24_ulgsjo.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/24_ulgsjo.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0025", "name": "King Pigeon", "sanskrit_name": "Eka Pada Rajakapotasana", "sanskrit_name_iast": "Eka Pāda Rājakapotāsana", "translation": "eka = one, pāda = foot or leg, rāja = king, kapota = pigeon, āsana = posture", "category": "Backbend Yoga", "categories": ["Backbend Yoga", "Hip Opening Yoga"], "difficulty": "Intermediate", "focus": "Spine", "target_areas": ["Spine", "Hips"], "description": "From a seated position with the hips squared, one leg is extended forward with the knee bent and parallel to the earth. The front heel is rooted close to the groin (or extended out in a 90 degree angle if flexibility allows). The other leg is extended back with the knee bent and perpendicular to the earth. The back foot is hooked on the inside of the elbow of the back arm. The front elbow is bent upward perpendicular to the earth with the bicep by the ear. The fingers are interlaced to connect the bind behind the body and assist in opening the chest. The gaze is natural and forward.", "benefits": "Stretches the thighs, groins (psoas), abdomen, chest, shoulders and neck. Stimulates the abdominal organs. Opens the shoulders and chest.", "instruction_steps": {"en": ["From a seated position with the hips squared, one leg is extended forward , "The palms are flat and the elbows are close to the side body.", "The joints are stacked with the wrists, elbows and shoulders in a straight line perpendicular to the earth.", "The gaze follows the spine and the eyes are focused down."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/26_mxkzlo.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/26_mxkzlo.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0027", "name": "Plow", "sanskrit_name": "Halasana", "sanskrit_name_iast": "Halāsana", "translation": "hala = plow, āsana = posture", "category": "Inversion Yoga", "categories": ["Inversion Yoga"], "difficulty": "Advanced", "focus": "Full Body", "target_areas": ["Full Body"], "description": "From a supine position, the upper back rests on the earth with the hips and legs revolved back over the torso above and beyond the head towards the earth. The torso is perpendicular to the earth. The legs are fully extended with no bend at the knees as the toes reach for the earth. The hands are either supporting the lower back or extended behind the back on the earth with extended elbows and fingers interlaced (as flexibility allows), opening the shoulders. The neck is straight. The chin tucked. Do not look to the side as this may injure the neck. The is gaze inward.", "benefits": "Calms the brain. Stimulates the abdominal organs and the thyroid glands. Stretches the shoulders and spine. Helps relieve the symptoms of menopause. Reduces stress and fatigue. Therapeutic for backache, headache, infertility, insomnia, and sinusitis.", "instruction_steps": {"en": ["From a supine position, the upper back rests on the earth with the hips and legs revolved back over the torso above and beyond the head towards the earth.", "The torso is perpendicular to the earth.", "The legs are fully extended with no bend at the knees as the toes reach for the earth.", "The hands are either supporting the lower back or extended behind the back on the earth with extended elbows and fingers interlaced (as flexibility allows), opening the shoulders.", "The neck is straight.", "The chin tucked.", "Do not look to the side as this may injure the neck.", "The is gaze inward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/27_m4yux9.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483088/yoga-api/27_m4yux9.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0028", "name": "Pyramid", "sanskrit_name": "Parsvottanasana", "sanskrit_name_iast": "Pārśvottānāsana", "translation": "pārśva = side, uttāna = stretch out, āsana = posture", "category": "Strengthening Yoga", "categories": ["Strengthening Yoga", "Forward Bend Yoga", "Standing Yoga"], "difficulty": "Intermediate", "focus": "Strength", "target_areas": ["Strength", "Hamstrings", "Legs"], "description": "From a standing position with one leg forward and one back lean the torso forward at the crease of the hip joint. Stop when the torso is parallel to the floor. Press the fingertips or flat palms to the floor on either side of the front foot, maintaining a straight elongated spine. If it isn’t possible to touch the floor, or to maintain a straight spine, support the hands on a pair of blocks. Press the thighs back and lengthen the torso forward, lifting up through the top of the sternum. Then, as flexibility allows, bring the front torso closer to the top of the thigh without rounding the spine. Eventually the long front torso will rest down on the thigh. The gaze is down.", "benefits": "Calms the brain. Stretches the spine, the shoulders, the hips and the hamstrings. Strengthens the legs. Stimulates the abdominal organs. Improves posture and sense of balance. Improves digestion.", "instruction_steps": {"en": ["From a standing position with one leg forward and one back lean the torso forward at the crease of the hip joint.", "Stop when the torso is parallel to the floor.", "Press the fingertips or flat palms to the floor on either side of the front foot, maintaining a straight elongated spine.", "If it isn’t possible to touch the floor, or to maintain a straight spine, support the hands on a pair of blocks.", "Press the thighs back and lengthen the torso forward, lifting up through the top of the sternum.", "Then, as flexibility allows, bring the front torso closer to the top of the thigh without rounding the spine.", "Eventually the long front torso will rest down on the thigh.", "The gaze is down."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483089/yoga-api/28_uu58tt.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483089/yoga-api/28_uu58tt.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0029", "name": "Reverse Warrior", "sanskrit_name": "Parsva Virabhadrasana", "sanskrit_name_iast": "Pārśva Vīrabhadrāsana", "translation": "pārśva = side, vīrabhadra = warrior, āsana = posture", "category": "Standing Yoga", "categories": ["Standing Yoga"], "difficulty": "Intermediate", "focus": "Legs", "target_areas": ["Legs"], "description": "From warrior II , the lower body stays static while the upper body arches back in a gentle back bend. The top arm is extended back with the bicep by the ear and the fingers spread wide. The other arm slides down the back leg resting on the thigh or shin, but not the knee joint. The gaze is up towards the sky.", "benefits": "Strengthens and stretches the legs, knees, and ankles. Stretches the groin, spine, waist, chest, lungs, and shoulders. Stimulates abdominal organs. Increases stamina. Relieves backaches, especially through second trimester of pregnancy. Therapeutic for carpal tunnel syndrome, flat feet, infertility, osteoporosis, and sciatica.", "instruction_steps": {"en": ["From warrior II , the lower body stays static while the upper body arches back in a gentle back bend.", "The top arm is extended back with the bicep by the ear and the fingers spread wide.", "The other arm slides down the back leg resting on the thigh or shin, but not the knee joint.", "The gaze is up towards the sky."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483089/yoga-api/29_ww7bot.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483089/yoga-api/29_ww7bot.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0030", "name": "Seated Forward Bend", "sanskrit_name": "Paschimottanasana", "sanskrit_name_iast": "Paśchimottānāsana", "translation": "paśchima = back, uttāna = stretch out, āsana = posture", "category": "Seated Yoga", "categories": ["Seated Yoga", "Forward Bend Yoga"], "difficulty": "Beginner", "focus": "Flexibility", "target_areas": ["Flexibility", "Hamstrings"], "description": "From a seated position with the sits bones rooted into the earth the legs extend forward to the degree that the chest and thighs can stay connected. The fingers wrap around the toes. The upper torso folds forward at the crease of the hips with the spine long. The gaze is forward.", "benefits": "Calms the brain and helps relieve stress and mild depression. Stretches the spine, shoulders and hamstrings. Stimulates the liver, kidneys, ovaries and uterus. Improves digestion. Helps relieve the symptoms of menopause and menstrual discomfort. Soothes headache and anxiety. Reduces fatigue. Therapeutic for high blood pressure, infertility, insomnia and sinusitis. Traditional texts say that Paschimottanasana increases appetite, reduces obesity and cures diseases.", "instruction_steps": {"en": ["From a seated position with the sits bones rooted into the earth the legs extend forward to the degree that the chest and thighs can stay connected.", "The fingers wrap around the toes.", "The upper torso folds forward at the crease of the hips with the spine long.", "The gaze is forward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/30_gumpl3.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/30_gumpl3.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0031", "name": "Lotus", "sanskrit_name": "Padmasana", "sanskrit_name_iast": "Padmāsana", "translation": "padma = lotus, āsana = posture", "category": "Seated Yoga", "categories": ["Seated Yoga"], "difficulty": "Beginner", "focus": "Flexibility", "target_areas": ["Flexibility"], "description": "Bring the bottom ankle and place it on top of the opposite knee, both ankles will be resting on top of the thighs.", "benefits": "Opens the hips, groin and stretches the knees, ankles and thighs. Strengthens the back and calms the mind, reduces stress and anxiety. Improves circulation and blood flow in the pelvis.", "instruction_steps": {"en": ["Bring the bottom ankle and place it on top of the opposite knee, both ankles will be resting on top of the thighs."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/31_ozseum.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/31_ozseum.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0032", "name": "Half Lord of the Fishes", "sanskrit_name": "Ardha Matsyendrasana", "sanskrit_name_iast": "Ardhā Matsyendrāsana", "translation": "ardha = half, matsya = fish, indra = king", "category": "Seated Yoga", "categories": ["Seated Yoga", "Hip Opening Yoga"], "difficulty": "Intermediate", "focus": "Flexibility", "target_areas": ["Flexibility", "Hips"], "description": "Begin in a seated position. Bend one knee so the sole of your foot is close to the opposite inner thigh. Bend your opposite knee in, foot on the floor, heel to the outside of your bent thigh. Extend your arm (same side of your Lotus leg) high into the sky and begin to twist it to the outside of your bent knee. Use your opposite hand as leverage to twist deeper. Hook your elbow to the outside of your thigh and gaze over your back shoulder. If you want to extend your twist deeper, wrap your arm around the shin of your bent knee and sweep your opposite arm around to meet it. Catch opposite fingertips or the wrist. Keep a long spine.", "benefits": "Stretches the shoulders, the chest, the thighs, the groins, and the abdomen. Strengthens the legs and the ankles. Improves balance.", "instruction_steps": {"en": ["Begin in a seated position.", "Bend one knee so the sole of your foot is close to the opposite inner thigh.", "Bend your opposite knee in, foot on the floor, heel to the outside of your bent thigh.", "Extend your arm (same side of your Lotus leg) high into the sky and begin to twist it to the outside of your bent knee.", "Use your opposite hand as leverage to twist deeper.", "Hook your elbow to the outside of your thigh and gaze over your back shoulder.", "If you want to extend your twist deeper, wrap your arm around the shin of your bent knee and sweep your opposite arm around to meet it.", "Catch opposite fingertips or the wrist.", "Keep a long spine."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/32_hafoa0.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/32_hafoa0.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0033", "name": "Shoulder Stand", "sanskrit_name": "Salamba Sarvangasana", "sanskrit_name_iast": "Sālamba Sarvāṅgāsana", "translation": "sa = with, ālamba = support, sarvāṅga = all limb, āsana = posture", "category": "Balancing Yoga", "categories": ["Balancing Yoga", "Inversion Yoga"], "difficulty": "Advanced", "focus": "Balance", "target_areas": ["Balance", "Full Body"], "description": "From a supine position, the upper back is resting on the earth with the hips straight up towards the sky. The torso is perpendicular to the earth. The legs are fully extended and the toes are active. The hands are either supporting the lower back or extended up by the side body in matchstick. The neck is flat on the earth and the chin is tucked in. The gaze is inward.", "benefits": "Calms the brain and helps relieve stress and mild depression. Stimulates the thyroid and prostate glands and abdominal organs. Stretches the shoulders and neck. Tones the legs and buttocks. Improves digestion. Helps relieve the symptoms of menopause. Reduces fatigue and alleviates insomnia. Therapeutic for asthma, infertility, and sinusitis.", "instruction_steps": {"en": ["From a supine position, the upper back is resting on the earth with the hips straight up towards the sky.", "The torso is perpendicular to the earth.", "The legs are fully extended and the toes are active.", "The hands are either supporting the lower back or extended up by the side body in matchstick.", "The neck is flat on the earth and the chin is tucked in.", "The gaze is inward."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/33_r7motl.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483091/yoga-api/33_r7motl.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0034", "name": "Side Plank", "sanskrit_name": "Vasisthasana", "sanskrit_name_iast": "Vasiṣṭhāsana", "translation": "vasiṣṭha = name of a sage, āsana = posture", "category": "Core Yoga", "categories": ["Core Yoga", "Arm Balance Yoga", "Balancing Yoga"], "difficulty": "Advanced", "focus": "Core", "target_areas": ["Core", "Arms", "Balance"], "description": "From an arm balance position the weight of the body is supported on one side and distributed equally between the bottom arm and foot while the other (top) arm lifts with fingers spread wide and the other (top) foot stacks on top. The grounded (bottom) foot is flat and gripping the earth from the outside edge of the foot. If flexibility of the foot is limited then instead of gripping the earth with a flat foot, the weight of the body is balanced on the side edge of the foot that is flexed instead of flat. The arm supporting the weight of the body and the grounded foot actively press into the floor as the shoulder blades firm against the back and then widen away from the spine drawing toward the tailbone. Bandhas are engaged to maintain balance and stability. The crown of the head reaches away from the neck and the gaze is up towards the hand.", "benefits": "Calms the brain and helps relieve stress and mild depression. Stretches the shoulders, hamstrings, calves, and arches. Strengthens the arms and legs. Helps relieve the symptoms of menopause. Helps prevent osteoporosis. Improves digestion. Relieves headache, insomnia, back pain, and fatigue. Therapeutic for high blood pressure, asthma, flat feet, sciatica.", "instruction_steps": {"en": ["From an arm balance position the weight of the body is supported on one side and distributed equally between the bottom arm and foot while the other (top) arm lifts with fingers spread wide and the other (top) foot stacks on top.", "The grounded (bottom) foot is flat and gripping the earth from the outside edge of the foot.", "If flexibility of the foot is limited then instead of gripping the earth with a flat foot, the weight of the body is balanced on the side edge of the foot that is flexed instead of flat.", "The arm supporting the weight of the body and the grounded foot actively press into the floor as the shoulder blades firm against the back and then widen away from the spine drawing toward the tailbone.", "Bandhas are engaged to maintain balance and stability.", "The crown of the head reaches away from the neck and the gaze is up towards the hand."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483093/yoga-api/34_qle5tp.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483093/yoga-api/34_qle5tp.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0035", "name": "Sphinx", "sanskrit_name": "Salamba Bhujangasana", "sanskrit_name_iast": "Sālamba Bhujaṅgāsana", "translation": "sālamba = supported, bhujaṅga = serpent, āsana = posture", "category": "Chest Opening Yoga", "categories": ["Chest Opening Yoga", "Backbend Yoga"], "difficulty": "Intermediate", "focus": "Chest", "target_areas": ["Chest", "Spine"], "description": "From a prone position with the pelvic bowl is firmly contracted interiorly towards the center line of the body while the pubis is tucked under. The legs are extended back and the tops of the feet are flat. The palms are flat and the elbows are on the mat, stacked right below the shoulders. On an inhalation, lift the sternum and extend the neck away from shoulders with the elbows, palms and pelvic bone firmly attached to the mat.", "benefits": "Strengthens the spine. Stretches the chest, the lungs, the shoulders and the abdomen. Stimulates the abdominal organs. Opens the heart and the lungs.", "instruction_steps": {"en": ["From a prone position with the pelvic bowl is firmly contracted interiorly towards the center line of the body while the pubis is tucked under.", "The legs are extended back and the tops of the feet are flat.", "The palms are flat and the elbows are on the mat, stacked right below the shoulders.", "On an inhalation, lift the sternum and extend the neck away from shoulders with the elbows, palms and pelvic bone firmly attached to the mat."]}, "image": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483092/yoga-api/35_dytwvz.png", "svg": "https://res.cloudinary.com/dko1be2jy/image/upload/fl_sanitize/v1676483092/yoga-api/35_dytwvz.svg", "created_at": "2024-01-01T00:00:00Z"}, {"id": "0036", "name": "Splits", "sanskrit_name": "Hanumanasana", "sanskrit_name_iast": "Hanumānāsana", "translation": "hanumān = monkey deity, āsana = posture", "category": "Seated Yoga", "categories": ["Seated Yoga"], "difficulty": "Beginner", "focus": "Flexibility", "target_areas": ["Flexibility"], "description": "The hips are parallel and squared to the earth with one leg extended forward. The op <script>
(function () {
  // State
  const state = {
    poses: POSES,
    filtered: POSES.slice(),
    search: '',
    filters: { category: new Set(), difficulty: new Set(), focus: new Set() },
    pageSize: 60,
  };

  const FACETS = {
    category:   ["Backbend Yoga", "Balancing Yoga", "Chest Opening Yoga", "Core Yoga", "Forward Bend Yoga", "General Yoga", "Hip Opening Yoga", "Inversion Yoga", "Restorative Yoga", "Seated Yoga", "Standing Yoga", "Strengthening Yoga"],
    difficulty: ["Advanced", "Beginner", "Intermediate"],
    focus:      ["Balance", "Chest", "Core", "Flexibility", "Full Body", "Hamstrings", "Hips", "Legs", "Relaxation", "Spine", "Strength"],
  };

  // DOM
  const gridEl        = document.getElementById('grid');
  const spinnerEl     = document.getElementById('spinner');
  const searchEl      = document.getElementById('search');
  const searchClearEl = document.getElementById('search-clear');
  const countEl       = document.getElementById('results-count');
  const activeFilEl   = document.getElementById('active-filters');
  const totalEl       = document.getElementById('pose-total');

  const modalOverlay      = document.getElementById('modal-overlay');
  const modalTitle        = document.getElementById('modal-title');
  const modalGif          = document.getElementById('modal-gif');
  const modalMeta         = document.getElementById('modal-meta');
  const modalMuscles      = document.getElementById('modal-muscles');
  const modalInstructions = document.getElementById('modal-instructions');
  const modalClose        = document.getElementById('modal-close');

  totalEl.textContent = state.poses.length.toLocaleString();

  // Build filter chips
  function buildChips() {
    Object.keys(FACETS).forEach(key => {
      const container = document.getElementById('chips-' + key);
      FACETS[key].forEach(val => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = val;
        chip.dataset.filter = key;
        chip.dataset.value = val;
        chip.addEventListener('click', () => {
          const set = state.filters[key];
          if (set.has(val)) { set.delete(val); chip.classList.remove('active'); }
          else { set.add(val); chip.classList.add('active'); }
          applyFilters();
        });
        container.appendChild(chip);
      });
    });
  }

  // Filtering
  function applyFilters() {
    const q = state.search.trim().toLowerCase();
    const { category, difficulty, focus } = state.filters;

    state.filtered = state.poses.filter(p => {
      if (category.size && !category.has(p.category)) {
        // also allow secondary categories match
        if (!(p.categories || []).some(c => category.has(c))) return false;
      }
      if (difficulty.size && !difficulty.has(p.difficulty)) return false;
      if (focus.size && !focus.has(p.focus)) return false;
      if (q) {
        const hay = (p.name + ' ' + p.sanskrit_name + ' ' + p.sanskrit_name_iast + ' ' + p.translation + ' ' + p.category).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    updateResultsBar();
    updateActiveBadges();
    renderGrid();
  }

  // Grid
  function renderGrid() {
    gridEl.innerHTML = '';
    const slice = state.filtered.slice(0, state.pageSize);

    if (slice.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<p>🧘</p><p>No poses found</p>';
      gridEl.appendChild(empty);
      spinnerEl.classList.remove('visible');
      return;
    }

    const frag = document.createDocumentFragment();
    slice.forEach(p => frag.appendChild(createCard(p)));
    gridEl.appendChild(frag);
    spinnerEl.classList.remove('visible');
  }

  function createCard(p) {
    const article = document.createElement('article');
    article.className = 'card';
    article.addEventListener('click', () => openModal(p.id));

    const media = document.createElement('div');
    media.className = 'card-media';

    const thumb = document.createElement('img');
    thumb.className = 'card-thumb';
    thumb.src = p.image;
    thumb.alt = p.name;
    thumb.loading = 'lazy';
    media.appendChild(thumb);

    const body = document.createElement('div');
    body.className = 'card-body';

    const name = document.createElement('h3');
    name.className = 'card-name';
    name.textContent = p.name;

    const sanskrit = document.createElement('div');
    sanskrit.className = 'card-sanskrit';
    sanskrit.textContent = p.sanskrit_name_iast || p.sanskrit_name;

    const tags = document.createElement('div');
    tags.className = 'card-tags';

    const catTag = document.createElement('span');
    catTag.className = 'tag tag-cat';
    catTag.textContent = p.category;

    const diffTag = document.createElement('span');
    diffTag.className = 'tag tag-equip';
    diffTag.textContent = p.difficulty;

    tags.appendChild(catTag);
    tags.appendChild(diffTag);

    body.appendChild(name);
    body.appendChild(sanskrit);
    body.appendChild(tags);

    article.appendChild(media);
    article.appendChild(body);
    return article;
  }

  // Results bar
  function updateResultsBar() {
    const total = state.filtered.length;
    const all   = state.poses.length;
    countEl.textContent = total === all
      ? all.toLocaleString() + ' poses'
      : total.toLocaleString() + ' of ' + all.toLocaleString() + ' poses';
  }

  function updateActiveBadges() {
    activeFilEl.innerHTML = '';
    let hasAny = false;
    const addBadges = (set, key) => {
      set.forEach(val => {
        hasAny = true;
        const badge = document.createElement('span');
        badge.className = 'active-badge';
        badge.innerHTML = val + '<button class="active-badge-remove" data-filter="' + key + '" data-value="' + val + '" aria-label="Remove ' + val + '">\u00d7</button>';
        activeFilEl.appendChild(badge);
      });
    };
    addBadges(state.filters.category,   'category');
    addBadges(state.filters.difficulty, 'difficulty');
    addBadges(state.filters.focus,      'focus');

    if (hasAny) {
      const clearAll = document.createElement('button');
      clearAll.className = 'clear-all';
      clearAll.textContent = 'Clear all';
      clearAll.addEventListener('click', clearAllFilters);
      activeFilEl.appendChild(clearAll);
    }
  }

  function clearAllFilters() {
    state.filters.category.clear();
    state.filters.difficulty.clear();
    state.filters.focus.clear();
    state.search = '';
    searchEl.value = '';
    searchClearEl.classList.remove('visible');
    document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
    applyFilters();
  }

  // Modal
  function openModal(id) {
    const p = state.poses.find(e => e.id === id);
    if (!p) return;

    modalTitle.textContent = p.name;
    modalGif.src = p.image;
    modalGif.alt = p.name;

    // Meta
    const metaItems = [
      ['Sanskrit', p.sanskrit_name_iast || p.sanskrit_name],
      ['Translation', p.translation],
      ['Category', p.category],
      ['Difficulty', p.difficulty],
      ['Focus', p.focus],
    ];
    modalMeta.innerHTML = metaItems.filter(m => m[1]).map(m =>
      '<div class="meta-item"><span class="meta-label">' + m[0] + '</span><span class="meta-value">' + m[1] + '</span></div>'
    ).join('');

    // Target areas (reuse muscles slot)
    const areas = p.target_areas || [];
    if (areas.length) {
      modalMuscles.innerHTML = '<h4>Target Areas</h4><div class="muscle-tags">' +
        areas.map(a => '<span class="muscle-tag">' + a + '</span>').join('') + '</div>';
    } else {
      modalMuscles.innerHTML = '';
    }

    // Description + benefits + steps
    let html = '';
    if (p.description) {
      html += '<h4>Description</h4><p class="modal-desc">' + p.description + '</p>';
    }
    if (p.benefits) {
      html += '<h4>Benefits</h4><p class="modal-desc">' + p.benefits + '</p>';
    }
    const steps = (p.instruction_steps && p.instruction_steps.en) || [];
    if (steps.length) {
      html += '<h4>Instructions</h4><ol class="instruction-list">' +
        steps.map(s => '<li>' + s + '</li>').join('') + '</ol>';
    }
    modalInstructions.innerHTML = html;

    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Events
  function wireEvents() {
    searchEl.addEventListener('input', (e) => {
      state.search = e.target.value;
      searchClearEl.classList.toggle('visible', !!e.target.value);
      applyFilters();
    });
    searchClearEl.addEventListener('click', () => {
      state.search = '';
      searchEl.value = '';
      searchClearEl.classList.remove('visible');
      applyFilters();
    });

    activeFilEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.active-badge-remove');
      if (!btn) return;
      const key = btn.dataset.filter;
      const val = btn.dataset.value;
      state.filters[key].delete(val);
      const chip = document.querySelector('.chip[data-filter="' + key + '"][data-value="' + val + '"]');
      if (chip) chip.classList.remove('active');
      applyFilters();
    });

    document.querySelectorAll('.filter-group-header').forEach(header => {
      header.addEventListener('click', () => {
        header.parentElement.classList.toggle('collapsed');
      });
    });

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });
  }

  // Init
  buildChips();
  wireEvents();
  applyFilters();
})();
</script>
</body>
</html>
